version: "3"
services:
    app:
        build: .
        container_name: "pen_ts_boilerplate_app"
        ports:
            - "3000:3000"
            - "5555:5555" # For Prisma Studio
        env_file:
            - .env.dev
        depends_on:
            - db
        volumes:
            - .:/app
            - /app/node_modules

    db:
        image: postgres:16
        container_name: postgres-db
        env_file:
            - .env.db.dev
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
